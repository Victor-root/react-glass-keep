<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Favicon. The 512x512 PNG is the primary source — modern browsers
       downsample it to whatever pixel size they need (16 in tabs, 32 in
       bookmarks, up to 192 for pinned shortcuts) for a much sharper
       result than the small bitmaps. The 32 and 16 PNG sizes stay so
       browsers that explicitly ask for them don't have to downsample
       the big image. The .ico is the legacy fallback for very old
       browsers (IE 11 etc.) that can't read PNG favicons. -->
  <link rel="icon" type="image/png" href="/favicon.png" sizes="512x512">
  <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
  <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16">
  <link rel="icon" href="/favicon.ico" sizes="any">

  <!-- iOS / iPadOS home screen icon -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f0e8ff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Glass Keep</title>
  <script>
    /* Boot-time branding: apply the cached custom app name + logo to the
       tab title and favicon BEFORE React mounts, so a reload doesn't
       flash the default name/logo. The BrandingProvider reads the same
       cache for its first render and then refreshes from the server.
       We also snapshot the bundled icon links so the app can restore
       them verbatim if the admin later clears the custom logo. */
    (function () {
      try {
        var sel = 'link[rel~="icon"], link[rel="apple-touch-icon"]';
        window.__GK_DEFAULT_ICONS__ = Array.prototype.map
          .call(document.head.querySelectorAll(sel), function (l) { return l.outerHTML; })
          .join('');
        // Per-device "reduce transparency effects" perf setting (ON by
        // default; the backdrop-filter blur is too GPU-heavy to ship as
        // the default). Apply the class before first paint so cards and
        // modals render without the blur immediately — no flash of the
        // glass effect. Only an explicit opt-out ("false") keeps the blur.
        if (localStorage.getItem('gk:reduce-effects') !== 'false') {
          document.documentElement.classList.add('gk-reduce-effects');
        }
        var c = JSON.parse(localStorage.getItem('gk:branding') || 'null');
        if (c && c.appName) document.title = c.appName;
        var fav = localStorage.getItem('gk:favicon');
        if (fav) {
          Array.prototype.forEach.call(document.head.querySelectorAll(sel), function (l) {
            l.parentNode.removeChild(l);
          });
          var icon = document.createElement('link'); icon.rel = 'icon'; icon.href = fav;
          document.head.appendChild(icon);
          var apple = document.createElement('link'); apple.rel = 'apple-touch-icon'; apple.href = fav;
          document.head.appendChild(apple);
        }
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
